<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - MyPitchGym</title>
  <link rel="icon" type="image/png" href="/assets/mpg-logo.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-page="forgot-password">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="forgotTitle">
      <div class="auth-brand">
        <a href="/" class="logo-link"><img src="/assets/mpg-logo.png" alt="MyPitchGym"></a>
        <a href="login.html" class="auth-home-link">Back to login</a>
      </div>

      <h1 id="forgotTitle">Reset your password</h1>
      <p>Enter your email and we will send reset instructions if an account exists.</p>

      <div class="auth-message" data-auth-message role="status" aria-live="polite"></div>

      <form class="auth-form" data-forgot-form>
        <div class="auth-field">
          <label for="resetEmail">Email</label>
          <input id="resetEmail" name="email" type="email" autocomplete="email" required>
        </div>
        <button class="auth-button" type="submit" data-forgot-submit>Send Reset Email</button>
      </form>
    </section>
  </main>

  <script type="module" src="auth-pages.js"></script>
</body>
</html>
