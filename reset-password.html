<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose New Password - MyPitchGym</title>
  <link rel="icon" type="image/png" href="/assets/mpg-logo.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-page="reset-password">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="resetTitle">
      <div class="auth-brand">
        <a href="/" class="logo-link"><img src="/assets/mpg-logo.png" alt="MyPitchGym"></a>
        <a href="login.html" class="auth-home-link">Back to login</a>
      </div>

      <h1 id="resetTitle">Choose a new password</h1>
      <p>Use the reset link from your email, then enter a new password below.</p>

      <div class="auth-message" data-auth-message role="status" aria-live="polite"></div>

      <form class="auth-form" data-reset-form>
        <div class="auth-field">
          <label for="newPassword">New password</label>
          <input id="newPassword" name="password" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="auth-field">
          <label for="newPasswordConfirm">Confirm new password</label>
          <input id="newPasswordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <button class="auth-button" type="submit" data-reset-submit>Update Password</button>
      </form>

      <div class="auth-secondary hidden" data-after-reset>
        <a class="auth-link" href="dashboard.html">Continue to member page</a>
      </div>
    </section>
  </main>

  <script type="module" src="auth-pages.js"></script>
</body>
</html>
